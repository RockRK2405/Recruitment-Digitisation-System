version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recruitment_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pwd_2026
      POSTGRES_DB: workforce_recruitment
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workforce_recruitment"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: recruitment_fastapi_server
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres_secure_pwd_2026@db:5432/workforce_recruitment
      - POSTGRES_HOST=db
      - CHROMA_DB_PATH=/app/data/chromadb
      - EMBEDDING_MODEL_NAME=intfloat/multilingual-e5-base
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/data/chromadb
      - shared_uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: recruitment_streamlit_dashboard
    restart: always
    environment:
      - API_URL=http://api:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8501:8501"
    volumes:
      - shared_uploads:/app/data/uploads
    depends_on:
      - api

volumes:
  postgres_data:
  chroma_data:
  shared_uploads:
