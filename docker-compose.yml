x-db-password: &db-password postgres_secure_pwd_2026

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: workforce_recruitment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: *db-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Python FastAPI AI service (OCR + LLM + matching)
  python-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - DATABASE_URL=postgresql://postgres:postgres_secure_pwd_2026@postgres:5432/workforce_recruitment
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.6:latest}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - CHROMA_DB_PATH=/data/chromadb
      - UPLOAD_DIR=/data/uploads
    volumes:
      - ai_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=workforce_recruitment
      - DB_USER=postgres
      - DB_PASSWORD=postgres_secure_pwd_2026
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AI_SERVICE_URL=http://python-api:8000
      - JWT_SECRET=${JWT_SECRET:-workforce-ai-jwt-secret-change-in-prod}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-api:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G
    profiles:
      - ai

volumes:
  postgres_data:
  redis_data:
  ai_data:
  ollama_data:
  uploads_data:
